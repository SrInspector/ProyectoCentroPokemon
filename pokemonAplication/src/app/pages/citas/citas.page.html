<ion-header>
  <ion-toolbar color="danger">
    <ion-buttons slot="start">
      <ion-button (click)="goBack()">
        <ion-icon name="arrow-back-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Citas Programadas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>

  <div *ngIf="isLoading" class="loading-container">
    <ion-spinner name="crescent" color="danger"></ion-spinner>
    <p>Cargando citas...</p>
  </div>

  <div *ngIf="!isLoading">

    <div *ngIf="citas.length === 0" class="empty-container">
      <ion-icon name="calendar-outline"></ion-icon>
      <p>No hay citas programadas</p>
    </div>

    <ion-card *ngFor="let cita of citas">
      <div class="card-header-custom">
        <img [src]="cita.pokemonImage" [alt]="cita.pokemonName" class="pokemon-mini">
        <div class="pokemon-info">
          <h2>{{ cita.pokemonName | titlecase }}</h2>
          <ion-badge [color]="getEstadoColor(cita.estado)">
            {{ cita.estado }}
          </ion-badge>
        </div>
      </div>

      <ion-card-content>
        <ion-list lines="none">
          <ion-item>
            <ion-icon name="calendar-outline" slot="start" color="danger"></ion-icon>
            <ion-label>
              <p>Fecha</p>
              <h3>{{ cita.fecha }}</h3>
            </ion-label>
          </ion-item>

          <ion-item>
            <ion-icon name="time-outline" slot="start" color="primary"></ion-icon>
            <ion-label>
              <p>Hora</p>
              <h3>{{ cita.hora }}</h3>
            </ion-label>
          </ion-item>

          <ion-item>
            <ion-icon name="clipboard-outline" slot="start" color="warning"></ion-icon>
            <ion-label>
              <p>Motivo</p>
              <h3>{{ cita.motivo }}</h3>
            </ion-label>
          </ion-item>

          <ion-item>
            <ion-icon name="business-outline" slot="start" color="success"></ion-icon>
            <ion-label>
              <p>Área</p>
              <h3>{{ cita.area }}</h3>
            </ion-label>
          </ion-item>
        </ion-list>
      </ion-card-content>
    </ion-card>

  </div>

</ion-content>
