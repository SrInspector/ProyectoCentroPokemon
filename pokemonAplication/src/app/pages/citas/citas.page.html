<ion-header>
  <ion-toolbar color="danger">
    <ion-buttons slot="start"><ion-button (click)="goBack()"><ion-icon name="arrow-back-outline" slot="icon-only"></ion-icon></ion-button></ion-buttons>
    <ion-title>Citas</ion-title>
  </ion-toolbar>
</ion-header>
<ion-content>
  <div *ngIf="isLoading" class="loading-container"><ion-spinner name="crescent" color="danger"></ion-spinner><p>Cargando citas...</p></div>
  <div *ngIf="!isLoading">
    <div *ngIf="citas.length === 0" class="empty-container"><p>No hay citas programadas</p></div>
    <ion-card *ngFor="let cita of citas">
      <ion-card-content>
        <ion-list lines="none">
          <ion-item><ion-label><p>Pokemon</p><h3>{{ cita.pokemon?.nombre || 'Sin dato' }}</h3></ion-label></ion-item>
          <ion-item><ion-label><p>Fecha</p><h3>{{ cita.fechaProgramadaUtc | date:'short' }}</h3></ion-label></ion-item>
          <ion-item><ion-label><p>Motivo</p><h3>{{ cita.motivo }}</h3></ion-label></ion-item>
          <ion-item><ion-label><p>Entrenador</p><h3>{{ cita.entrenador?.nombre || 'Sin dato' }}</h3></ion-label></ion-item>
          <ion-item><ion-label><p>Estado</p><ion-badge [color]="getEstadoColor(cita.estado)">{{ cita.estado }}</ion-badge></ion-label></ion-item>
        </ion-list>
      </ion-card-content>
    </ion-card>
  </div>
</ion-content>
